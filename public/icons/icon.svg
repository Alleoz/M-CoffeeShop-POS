<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Coffee cup body -->
  <rect x="140" y="180" width="200" height="180" rx="24" fill="white" opacity="0.95"/>
  <!-- Cup handle -->
  <path d="M340 220 Q400 220 400 280 Q400 340 340 340" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.95"/>
  <!-- Steam lines -->
  <path d="M200 160 Q210 130 200 100" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <path d="M240 150 Q250 120 240 90" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <path d="M280 160 Q290 130 280 100" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <!-- Saucer -->
  <ellipse cx="240" cy="380" rx="140" ry="20" fill="white" opacity="0.4"/>
  <!-- Letter M -->
  <text x="240" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="100" fill="#ea580c" opacity="0.9">M</text>
</svg>
